name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run unit

      - name: Audit — ARIA + CSS coverage
        run: npx tsx scripts/generate-render.ts --audit

      - name: Audit — Conditional rendering
        run: npx tsx scripts/generate-render.ts --audit-conditionals

      - name: Audit — No hashed tokens in internal.ts
        run: |
          node -e "
            const fs = require('fs');
            const p = require('path');
            const re = /--([\w-]+)-([a-z0-9]{6})\b/g;
            let found = 0;
            for (const dir of fs.readdirSync('src', {withFileTypes:true})) {
              if (!dir.isDirectory()) continue;
              const f = p.join('src', dir.name, 'internal.ts');
              if (!fs.existsSync(f)) continue;
              const src = fs.readFileSync(f,'utf8');
              let m;
              while ((m = re.exec(src)) !== null) {
                const hash = m[2];
                if (/[0-9]/.test(hash)) { found++; console.log(f + ': --' + m[1] + '-' + hash); }
              }
            }
            if (found) { console.error(found + ' hashed token(s) found. Dehash them.'); process.exit(1); }
            console.log('No hashed tokens found.');
          "

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -e "console.log(require('./package-lock.json').packages['node_modules/@playwright/test'].version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run tests
        run: npm test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test/.results/
          retention-days: 7
