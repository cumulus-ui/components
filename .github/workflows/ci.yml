name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run build:cdn
      - name: Smoke-test CDN bundle
        run: node --input-type=module -e "import './dist/cumulus-ui.cdn.js'"
      - name: Upload demo
        uses: actions/upload-artifact@v4
        with:
          name: demo
          path: |
            demo/
            dist/cumulus-ui.cdn.js
